name: Terraform CD

on:
  workflow_dispatch:

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: .

    env:
      AWS_REGION: ${{ vars.TF_VAR_aws_region }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
      TF_VAR_project_name: ${{ vars.TF_VAR_project_name }}
      TF_VAR_environment: ${{ vars.TF_VAR_environment }}
      TF_VAR_owner: ${{ vars.TF_VAR_owner }}
      TF_VAR_ssh_allowed_cidr: ${{ vars.TF_VAR_ssh_allowed_cidr }}
      TF_VAR_key_pair_name: ${{ vars.TF_VAR_key_pair_name }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false